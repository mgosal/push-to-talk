# Push-to-Talk — voice typing for macOS  

# Example configuration for push-to-talk.
# Copy to ~/.config/push-to-talk/config.toml

[api]
# OpenAI-compatible chat completions endpoint.
# Default: OpenRouter (vendor-neutral).
# The setup UI can switch between these supported patterns:
#   OpenRouter: "https://openrouter.ai/api/v1/chat/completions"
#   OpenAI:     "https://api.openai.com/v1/chat/completions"
endpoint = "https://openrouter.ai/api/v1/chat/completions"

# Model identifier. Must support audio input.
#   OpenRouter: "openai/gpt-4o-audio-preview"
#   OpenAI:     "gpt-4o-audio-preview"
model = "openai/gpt-4o-audio-preview"

# API key. Three options (checked in order):
#   1. Inline:       key = "sk-or-..."
#   2. File:         key_file = "api-key"        (relative to config dir; setup UI writes this)
#   3. Environment:  OPENROUTER_API_KEY or OPENAI_API_KEY
# key = ""
key_file = "api-key"

# Retry on 5xx / connection errors.
max_retries = 3
retry_backoff = [1, 3, 5]

[audio]
# Native macOS AVFAudio recording. No external recorder binary is required.
# Minimum recording duration (seconds). Shorter = discard.
min_duration_s = 0.4

[transcription]
# Speaker profile for transcription priming.
# Generated by the "Set Up Speaker Profile" menu item, or create manually.
# Describes the speaker's accent, vocabulary, domain terms, pronunciation patterns.
# speaker_profile = "~/.config/push-to-talk/speaker-profile.md"

# Hallucination guard: max words-per-second threshold.
max_wps = 5.0

# Directory for saved transcript markdown files (with YAML frontmatter).
# Each transcription is saved as a .md file alongside the DB record.
# transcripts_dir = "~/dictation/transcripts"

[storage]
# SQLite database for history & corrections.
# Default: ~/.config/push-to-talk/history.db
# db = "~/my-project/ptt-history.db"

# Temporary native WAV recording directory. Default: system temp.
# audio_dir = "/tmp/ptt"

# PID file for detecting running instance. Default: /tmp/ptt.pid
pid_file = "/tmp/ptt.pid"

# Unix socket for IPC (--toggle, --status). Default: /tmp/ptt.sock
socket_path = "/tmp/ptt.sock"
